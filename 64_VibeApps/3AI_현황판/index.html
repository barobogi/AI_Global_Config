<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3AI 뿌리체계 현황판</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>🤖 3AI 현황판</h1>
            <button id="refresh-btn" class="glass-btn">새로고침</button>
        </header>

        <section class="agents-status">
            <div class="agent-card" id="agent-manbok">
                <span class="status-indicator online"></span>
                <span class="agent-name">만복</span>
            </div>
            <div class="agent-card" id="agent-coni">
                <span class="status-indicator offline"></span>
                <span class="agent-name">코니</span>
            </div>
            <div class="agent-card" id="agent-anti">
                <span class="status-indicator online"></span>
                <span class="agent-name">안티</span>
            </div>
        </section>

        <main class="tasks-container">
            <div class="task-column">
                <h2>📋 진행 중</h2>
                <ul id="in-progress-list" class="task-list">
                    <!-- JS로 채워짐 -->
                </ul>
            </div>
            
            <div class="task-column">
                <h2>⏳ 대기 중</h2>
                <ul id="pending-list" class="task-list">
                    <!-- JS로 채워짐 -->
                </ul>
            </div>
        </main>

        <footer>
            <div class="inbox-status">
                📬 오늘 수신함: <span id="inbox-count">0</span>건
            </div>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
